<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kórus Studio</title>
    <link rel="icon" href="/favicon.ico.ico">
    <link rel="stylesheet" href="./assets/css/style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />

</head>
<body>
    <main>

        <div class="container-top">
            <a href="index.html">Kórus Studio</a>
            <div class="button-add">
                <button id="adicionar-pasta">Adicionar Pasta</button>
                <button id="adicionar-musica">Adicionar Música</button>
            </div>
            
        </div>

        <div id="library-screen">
            <div id="library-container"></div>
        

            <div class="container-preview">
                <img id="preview-cover">
                <h2 id="preview-title"></h2>
                <h3 id="preview-artist"></h3>
                <span id="duration"></span>
            </div>
        </div>
        
        <div id="player-screen" class="hidden" >
            
                <div class="container-left"> 
                <div class="header-player2">
                    <div class="header-player">
                        <h2 id="song-title"></h2>
                        <h3 id="song-artist"></h3>
                        
            </div>
                    <button id="back-button">Back</button>
                    </div>
                    <div class="control-pitch">
                        <h3>Pitch</h3>
                        <button id="tom-abaixo">-</button>
                        <span id="tonalidade-atual">0.0</span>
                        <button id="tom-acima">+</button>
                    </div>
                
                    <div id="slider-progress"></div>

                    <div id="player-controls">
    
                        <button id="pause">
                            <span class="material-symbols-outlined">pause</span>
                        </button>

                        <button id="play">
                            <span class="material-symbols-outlined">play_arrow</span>
                        </button>

                        <button id="stop">
                            <span class="material-symbols-outlined">stop</span>
                        </button>
                        
                    </div>

                    <div id="progress-container"></div>
                    <div id="tracks-container"></div>

                    
                </div>
                <div class="container-lyrics"></div>
            </div>
            
        

    </main>
    <script type="module" src="./src/main.js"></script>
</body>
</html>
